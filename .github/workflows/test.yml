name: Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build pytest pytest-cov
              
      - name: Clean build artifacts
        run: |
          rm -rf dist/ build/ *.egg-info/

      - name: Build package
        run: |
          python -m build

      - name: Install package
        run: |
          pip install dist/*.whl

      - name: Test import
        run: |
          python -c "from SessionSmith import save_session, load_session, SessionManager, ssm; print('Import successful')"

      - name: Run tests
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v --tb=short --timeout=300 -x

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run ruff
        run: |
          ruff check SessionSmith/ --ignore E501

      - name: Run mypy
        run: |
          mypy SessionSmith/ --ignore-missing-imports --no-error-summary || true

