name: Update Homebrew Formula

on:
  push:
    tags:
      - 'v*'  # vで始まるタグがプッシュされたときに実行

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get tag name
        id: tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Tag: $TAG_NAME"
      
      - name: Calculate SHA256
        id: sha256
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG_NAME}.tar.gz"
          echo "Downloading: $URL"
          SHA256=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"
      
      - name: Update Formula
        run: |
          TAG_NAME="${{ steps.tag.outputs.tag_name }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"
          
          # Formulaファイルを更新
          sed -i.bak \
            -e "s|url \".*\"|url \"https://github.com/${{ github.repository }}/archive/refs/tags/${TAG_NAME}.tar.gz\"|" \
            -e "s|sha256 \".*\"|sha256 \"${SHA256}\"|" \
            Formula/sessionsmith.rb
          
          # バックアップファイルを削除
          rm -f Formula/sessionsmith.rb.bak
          
          # 変更を確認
          echo "Updated Formula:"
          cat Formula/sessionsmith.rb
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add Formula/sessionsmith.rb
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Formula SHA256 for ${{ steps.tag.outputs.tag_name }}"
            git push origin HEAD:main
          fi

